  #     - "3000:3000"    # REST API
  #     - "8081:8081"    # WebSocket Gateway
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://asterion:asterion_dev@postgres:5432/asterion
  #     WS_PORT: 8081
  #     API_PORT: 3000

  # Phase 3: Ground UI (React)
  # ground_ui:
  #   build: ./ground/ui
  #   container_name: asterion-ground-ui
  #   ports:
  #     - "5173:5173"    # Vite dev server
  #   depends_on:
  #     - api_server

  # Phase 4: Digital Twin
  # twin:
  #   build: ./twin
  #   container_name: asterion-twin
  #   depends_on:
  #     - api_server
  #   environment:
  #     GROUND_API_URL: http://api_server:3000/api
  #     TWIN_CYCLE_SEC: 60

volumes:
  pgdata:
    name: asterion-pgdata
